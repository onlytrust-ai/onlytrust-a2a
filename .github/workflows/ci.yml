name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379

    env:
      RAILS_ENV: test
      MONGODB_URI: mongodb://localhost:27017/onlytrust_a2a_test
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_MASTER_KEY: test-encryption-key-for-ci-only
      BUNDLE_RUBYGEMS__PKG__GITHUB__COM: ${{ secrets.BUNDLE_RUBYGEMS__PKG__GITHUB__COM }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: onlytrust-ai/onlytrust-core
          path: onlytrust-core
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rspec

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec brakeman --no-pager

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop --parallel
