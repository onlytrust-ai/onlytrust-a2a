development:
  clients:
    default:
      database: onlytrust_a2a_development
      hosts:
        - localhost:27017
      options:
        server_selection_timeout: 5
        max_pool_size: 12
  options:
    raise_not_found_error: false

test:
  clients:
    default:
      database: onlytrust_a2a_test
      hosts:
        - localhost:27017
      options:
        server_selection_timeout: 5
        max_pool_size: 12
  options:
    raise_not_found_error: false

production:
  clients:
    default:
      uri: <%= ENV["MONGODB_URI"] %>
      options:
        server_selection_timeout: 5
        max_pool_size: 12
  options:
    raise_not_found_error: false
